schema_version: 1
repository_path: axi-stream-router
run_artifact_dir: ../.rtl-agent/runs
allowed_working_paths:
  - axi-stream-router
protected_paths: []
execution:
  timeout_seconds: 30
  max_output_bytes: 1048576
commands:
  smoke:
    argv:
      - python3
      - -c
      - "print('axi stream router smoke ok')"
    cwd: axi-stream-router
    timeout_seconds: 10
