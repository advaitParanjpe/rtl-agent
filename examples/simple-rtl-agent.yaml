schema_version: 1
repository_path: simple-rtl
run_artifact_dir: ../.rtl-agent/runs
allowed_working_paths:
  - simple-rtl
protected_paths: []
execution:
  timeout_seconds: 30
  max_output_bytes: 1048576
commands:
  smoke:
    argv:
      - python3
      - -c
      - "print('simple rtl smoke ok')"
    cwd: simple-rtl
    timeout_seconds: 10
  check-define:
    argv:
      - python3
      - -c
      - "from pathlib import Path; assert '`define SIMPLE_RTL_EXAMPLE 1' in Path('rtl/defs.svh').read_text()"
    cwd: simple-rtl
    timeout_seconds: 10
